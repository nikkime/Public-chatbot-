<!DOCTYPE html>
<html>
<head>
<title>Health AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: white;
  text-align: center;
}

.container { padding: 20px; }

input, button {
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button { background: black; color: white; }

.chat {
  margin-top: 20px;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Health AI App</h1>

<form method="POST">
<input name="weight" placeholder="Weight (kg)" required><br>
<input name="height" placeholder="Height (cm)" required><br>
<button type="submit">Calculate BMI</button>
</form>

{% if bmi %}
<h2>BMI: {{bmi}}</h2>
<h3>{{category}}</h3>
{% endif %}

<div class="chat">
<h3>Chatbot 💬</h3>
<div id="chatbox"></div>

<input id="msg" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
function send(){
let m = document.getElementById("msg").value;

fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:m})
})
.then(r=>r.json())
.then(d=>{
chatbox.innerHTML += "<p><b>You:</b> "+m+"</p>";
chatbox.innerHTML += "<p><b>AI:</b> "+d.response+"</p>";
});

document.getElementById("msg").value="";
}
</script>

</body>
</html>
