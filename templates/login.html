<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="center">

<div class="login-container">

    <h1>💙 Welcome to AI Health Assistant</h1>

    <p class="subtitle">
        Track your health, calculate BMI, and get smart lifestyle suggestions instantly.
    </p>

    <div class="login-card">
        <h2>Login to Continue</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Enter your name" required>
            <button type="submit">Start Your Journey 🚀</button>
        </form>

        <p class="footer-text">
            Your health matters. Stay consistent, stay strong 💪
        </p>
    </div>

</div>

</body>
</html>
